<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bridal Collection | Sorah Salwar</title>
    <meta name="description" content="Discover Sorah Salwar's exclusive Bridal Collection. Beautifully crafted ethnic wear for your special day.">
    <link rel="stylesheet" href="assets/css/styles.css">
    <style>
        /* Specific tweaks for inner pages */
        .inner-hero {
            height: 40vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--color-light);
            color: var(--color-dark);
            text-align: center;
            padding-top: 80px; 
        }
        .inner-hero h1 {
            font-size: 2.6rem;
            letter-spacing: 2px;
        }
        .inner-hero p {
            font-weight: 300;
            color: var(--color-text-muted);
            margin-top: 1rem;
        }
    </style>
</head>
<body>

    <!-- Announcement Bar -->
    <div class="announcement-bar">
        New Arrivals - Experience the Epitome of Elegance
    </div>

    <!-- Header / Nav -->
    <header id="main-header" class="scrolled">
        <div class="menu-toggle" id="mobile-menu-btn">
            <span></span>
            <span></span>
            <span></span>
        </div>
        
        <div class="logo">
            <a href="index.html">Sorah Salwar</a>
        </div>

        <div class="header-icons">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l8.78-8.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
            </svg>
        </div>
    </header>

    <!-- Mobile Nav Overlay -->
    <div class="mobile-nav-overlay" id="mobile-overlay">
        <div class="overlay-close" id="overlay-close-btn">&times;</div>
        <ul>
            <li><a href="bridal.html">Bridal</a></li>
            <li><a href="formals.html">Formals</a></li>
            <li><a href="pret.html">Pret / Ready to Wear</a></li>
            <li><a href="unstitched.html">Unstitched</a></li>
        </ul>
    </div>

    <!-- Category Swipe Bar -->
    <div class="category-slider">
        <a href="bridal.html" class="active">Bridal</a>
        <a href="formals.html">Formals</a>
        <a href="pret.html">Pret</a>
        <a href="unstitched.html">Unstitched</a>
    </div>

    <!-- Page Header (Baroque style "Box") -->
    <section class="inner-hero">
        <h1>Bridal Collection</h1>
    </section>

    <!-- Filter & Sort Bar -->
    <div class="filter-bar">
        <div class="filter-item">Filter</div>
        <div class="filter-item">Sort By</div>
        <div class="filter-item">
            <div class="view-toggles">
                <div class="view-toggle" id="view-1"></div>
                <div class="view-toggle active" id="view-2"></div>
            </div>
        </div>
    </div>

    <!-- Bridal Products Grid -->
    <section class="shop-section">
        <div class="product-grid" id="product-container" data-category="bridal">
            <!-- Dynamic products will load here -->
        </div>
    </section>

    <!-- Sub Footer -->
    <footer>
        <div class="footer-bottom" style="border-top: none; padding-top: 0;">
            <p>&copy; 2026 Sorah Salwar. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="assets/js/script.js"></script>
</body>
</html>
