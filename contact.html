<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Sorah Salwar</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <style>
        .inner-hero { height: 40vh; display: flex; align-items: center; justify-content: center; background-color: var(--color-light); color: var(--color-dark); text-align: center; padding-top: 80px; }
        .inner-hero h1 { font-size: 2.6rem; letter-spacing: 2px; }
        .inner-hero p { font-weight: 300; color: var(--color-text-muted); margin-top: 1rem; }
        
        .contact-section { padding: 5rem 5%; text-align: center; }
        .contact-container { max-width: 800px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; }
        .contact-box { background: var(--color-light); padding: 3rem; border-radius: 8px; transition: transform 0.3s; text-decoration: none; display: block; border: 1px solid var(--color-border); }
        .contact-box:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .contact-box h3 { font-size: 1.5rem; margin-bottom: 1rem; color: var(--color-dark); }
        .contact-box p { color: var(--color-text-muted); font-size: 1.1rem; }
        .contact-box svg { width: 40px; height: 40px; margin-bottom: 1rem; stroke: var(--color-accent); }

        @media (max-width: 768px) {
            .contact-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header id="main-header" class="scrolled">
        <div class="menu-toggle"><span></span><span></span><span></span></div>
        <div class="logo"><a href="index.html">Sorah Salwar</a></div>
        <nav>
            <ul class="nav-links">
                <li><a href="bridal.html">Bridal</a></li>
                <li><a href="formals.html">Formals</a></li>
                <li><a href="pret.html">Pret / Ready to Wear</a></li>
                <li><a href="unstitched.html">Unstitched</a></li>
            </ul>
        </nav>
    </header>

    <section class="inner-hero">
        <div>
            <h1>Contact Us</h1>
            <p>We're here to assist you with your personalized shopping experience.</p>
        </div>
    </section>

    <section class="contact-section">
        <div class="contact-container">
            <a href="mailto:info@sorahsalwar.com" class="contact-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                <h3>Email ID</h3>
                <p>info@sorahsalwar.com</p>
            </a>
            
            <a href="https://wa.me/971527467449" class="contact-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
                <h3>WhatsApp</h3>
                <p>+971 52 746 7449</p>
            </a>
        </div>
    </section>
    
    <footer><div class="footer-bottom" style="border-top: none; padding: 2rem; background-color: var(--color-dark); color: #888; text-align: center;"><p>&copy; 2026 Sorah Salwar. All Rights Reserved.</p></div></footer>
    <script src="assets/js/script.js"></script>
</body>
</html>
